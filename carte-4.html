<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ma carte de fidélité</title>
<meta name="description" content="Votre carte de fidélité dématérialisée">
<meta name="theme-color" content="#0f0e11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ma Carte">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0e11;
  --surface: #1a1820;
  --surface2: #232130;
  --border: #2e2b3a;
  --border2: #3e3b50;
  --accent: #c8a96e;
  --accent2: #e8c98a;
  --accent3: rgba(200,169,110,0.12);
  --text: #f0edf7;
  --muted: #8a859a;
  --muted2: #6a6578;
  --success: #70c9a0;
  --danger: #e07070;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── HEADER ── */
.top-bar {
  width: 100%;
  padding: 1rem 1.2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(15,14,17,0.95);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
}
.top-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--accent);
}
.top-logo span { color: var(--text); font-weight: 400; }
.top-shop { font-size: 0.78rem; color: var(--muted); }

/* ── WRAPPER ── */
.wrapper {
  width: 100%;
  max-width: 420px;
  padding: 1.2rem 1rem 5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* ── ANIMATIONS ── */
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes stampPop {
  0%   { transform: scale(0) rotate(-20deg); opacity:0; }
  50%  { transform: scale(1.4) rotate(6deg); opacity:1; }
  70%  { transform: scale(0.9) rotate(-2deg); }
  100% { transform: scale(1) rotate(0deg); opacity:1; }
}
@keyframes stampGlow {
  0%   { box-shadow: 0 0 0 0 rgba(200,169,110,0.7); }
  60%  { box-shadow: 0 0 0 14px rgba(200,169,110,0); }
  100% { box-shadow: 0 0 0 0 rgba(200,169,110,0); }
}
@keyframes confettiFly {
  0%   { transform: translateY(0) rotate(0deg) scale(1); opacity:1; }
  100% { transform: translateY(-90px) rotate(360deg) scale(0); opacity:0; }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes rewardPulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(200,169,110,0.4); }
  50%  { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(200,169,110,0); }
}

.wrapper { animation: fadeInUp 0.4s ease; }
.stamp-el.animate-pop { animation: stampPop 0.5s cubic-bezier(0.23,1,0.32,1) forwards, stampGlow 0.7s ease-out 0.1s forwards; }
.confetti-particle { position:fixed; pointer-events:none; font-size:1.2rem; z-index:9999; animation: confettiFly 1s cubic-bezier(0.23,1,0.32,1) forwards; }

.stamp-flash {
  position: fixed; top:50%; left:50%;
  transform: translate(-50%,-50%) scale(0);
  background: var(--accent); color: #1a1410;
  border-radius: 18px; padding: 0.8rem 1.8rem;
  font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700;
  z-index: 9998; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  transition: transform 0.35s cubic-bezier(0.23,1,0.32,1), opacity 0.3s;
  opacity:0; text-align:center; pointer-events:none; white-space:nowrap;
}
.stamp-flash.show { transform: translate(-50%,-50%) scale(1); opacity:1; }

/* ── CARD VISUAL ── */
.loyalty-card {
  border-radius: 22px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 24px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
  min-height: 200px;
  transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
}
.loyalty-card:active { transform: scale(0.98); }
.card-inner {
  position: relative;
  padding: 1.4rem;
  min-height: 200px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.card-pattern { position:absolute; inset:0; opacity:0.08; pointer-events:none; }
.card-shop-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem; font-weight: 700;
  text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  line-height: 1.2;
}
.card-tagline { font-size: 0.7rem; opacity: 0.7; font-style: italic; margin-top: 0.2rem; }
.card-category {
  font-size: 0.6rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; padding: 0.2rem 0.55rem;
  border-radius: 20px; border: 1px solid currentColor;
  opacity: 0.75; align-self: flex-start;
}
.card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.card-stamps { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 0.75rem; }
.stamp-el {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid; display: flex; align-items: center;
  justify-content: center; font-size: 0.85rem; transition: all 0.3s;
}
.stamp-el.filled { opacity: 1; }
.stamp-el.empty  { opacity: 0.22; }
.stamp-el.square { border-radius: 7px; }
.stamp-el.star   { border-radius: 3px; }

/* ── PROGRESS ── */
.progress-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.1rem 1.3rem;
}
.block-label {
  font-size: 0.68rem; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--muted); margin-bottom: 0.65rem;
}
.progress-bar { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; margin-bottom: 0.45rem; }
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 5px;
  transition: width 1.2s cubic-bezier(0.23,1,0.32,1);
  position: relative; overflow: hidden;
}
.progress-fill::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
  background-size: 200% 100%; animation: shimmer 2s infinite;
}
.progress-meta { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--muted); }
.progress-pct { font-weight: 600; color: var(--accent); }

/* ── REWARD ── */
.reward-block {
  background: linear-gradient(135deg, rgba(200,169,110,0.14), rgba(200,169,110,0.04));
  border: 1px solid rgba(200,169,110,0.28);
  border-radius: 16px; padding: 1.1rem 1.3rem;
  display: flex; align-items: center; gap: 1rem;
  transition: all 0.5s;
}
.reward-block.complete {
  background: linear-gradient(135deg, rgba(200,169,110,0.28), rgba(200,169,110,0.08));
  border-color: var(--accent);
  animation: rewardPulse 2s ease-in-out infinite;
}
.reward-icon { font-size: 2.2rem; flex-shrink: 0; }
.reward-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--accent); }
.reward-desc { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; line-height: 1.4; }

/* ── CODE & QR ── */
.code-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 1.1rem 1.3rem;
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
}
.code-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 0.3rem; }
.code-val { font-family: 'DM Mono', monospace; font-size: 1rem; color: var(--accent); letter-spacing: 3px; }
.qr-box { width: 68px; height: 68px; background: white; border-radius: 10px; padding: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.qr-box canvas, .qr-box img { width: 60px !important; height: 60px !important; }

/* ── INSTALL BANNER ── */
.install-banner {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 1rem 1.2rem; display: flex; align-items: center; gap: 0.9rem;
  z-index: 500; transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
  box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
}
.install-banner.show { transform: translateY(0); }
.install-banner-icon { font-size: 1.8rem; flex-shrink: 0; }
.install-banner-text { flex: 1; }
.install-banner-title { font-weight: 600; font-size: 0.88rem; }
.install-banner-sub { font-size: 0.73rem; color: var(--muted); margin-top: 0.1rem; }
.install-banner-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

/* ── HISTORY ── */
.history-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
.history-title {
  padding: 0.85rem 1.2rem;
  font-size: 0.7rem; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.6px;
  border-bottom: 1px solid var(--border);
}
.history-item {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.7rem 1.2rem; border-bottom: 1px solid var(--border); font-size: 0.8rem;
}
.history-item:last-child { border-bottom: none; }
.h-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.h-text { flex: 1; color: var(--text); }
.h-time { font-family: 'DM Mono', monospace; font-size: 0.67rem; color: var(--muted2); white-space: nowrap; }

/* ── ERROR STATE ── */
.error-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; text-align: center; gap: 1rem;
}
.error-icon { font-size: 3.5rem; opacity: 0.5; }
.error-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; }
.error-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.5; max-width: 280px; }

/* ── BUTTONS ── */
.btn {
  padding: 0.5rem 1.1rem; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  font-weight: 500; cursor: pointer; border: none; transition: all 0.2s;
}
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary { background: var(--accent); color: #1a1410; font-weight: 600; }
.btn-primary:hover { background: var(--accent2); }
.btn-sm { padding: 0.35rem 0.75rem; font-size: 0.76rem; }

/* ── BADGE COMPLET ── */
.complete-badge {
  display: inline-flex; align-items: center; gap: 0.4rem;
  background: rgba(200,169,110,0.2); border: 1px solid var(--accent);
  color: var(--accent); border-radius: 20px; padding: 0.3rem 0.8rem;
  font-size: 0.75rem; font-weight: 600; margin-top: 0.5rem;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-logo">Fidélité<span>Pro</span></div>
  <div class="top-shop" id="topShopName"></div>
</div>

<div id="mainContent" style="width:100%;display:flex;flex-direction:column;align-items:center"></div>

<!-- Install banner -->
<div class="install-banner" id="installBanner">
  <div class="install-banner-icon">✦</div>
  <div class="install-banner-text">
    <div class="install-banner-title">Ajouter à l'écran d'accueil</div>
    <div class="install-banner-sub">Accédez à votre carte en un tap</div>
  </div>
  <div class="install-banner-actions">
    <button class="btn btn-ghost btn-sm" onclick="dismissBanner()">Plus tard</button>
    <button class="btn btn-primary btn-sm" onclick="installApp()">Installer</button>
  </div>
</div>

<!-- Stamp flash -->
<div class="stamp-flash" id="stampFlash"></div>

<script>
// ── UTILS ──
function timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1) return 'à l\'instant';
  if (m < 60) return `il y a ${m}min`;
  const h = Math.floor(m/60);
  if (h < 24) return `il y a ${h}h`;
  const d = Math.floor(h/24);
  if (d < 30) return `il y a ${d}j`;
  return `il y a ${Math.floor(d/30)} mois`;
}
function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'});
}

// ── LOAD DATA FROM localStorage (shared with index.html on same origin) ──
function getData() {
  return {
    cards:   JSON.parse(localStorage.getItem('fp_cards')   || '[]'),
    clients: JSON.parse(localStorage.getItem('fp_clients') || '[]'),
    activity: JSON.parse(localStorage.getItem('fp_activity') || '[]'),
  };
}

// ── GET CODE FROM URL ou localStorage ──
function getCodeFromURL() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code') || params.get('c') || null;
  const cardId = params.get('card') || null;

  if (code) {
    // Première visite via lien → on sauvegarde pour les prochaines ouvertures
    localStorage.setItem('fp_client_code', code);
    if (cardId) localStorage.setItem('fp_client_card', cardId);
    return { code, cardId };
  }

  // Ouverture depuis l'écran d'accueil sans paramètres → on relit le code sauvegardé
  const savedCode   = localStorage.getItem('fp_client_code');
  const savedCardId = localStorage.getItem('fp_client_card');
  if (savedCode) return { code: savedCode, cardId: savedCardId };

  return { code: null, cardId: null };
}

// ── APPLY PATTERN TO SVG ──
function applyPattern(svg, pattern, col, w, h) {
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.innerHTML = '';
  if (!pattern || pattern === 'none') return;
  if (pattern === 'dots') {
    for(let x=10;x<w;x+=22) for(let y=10;y<h;y+=22){const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',1.5);c.setAttribute('fill',col);svg.appendChild(c);}
  } else if (pattern === 'lines') {
    for(let x=-h;x<w+h;x+=20){const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',x);l.setAttribute('y1',0);l.setAttribute('x2',x+h);l.setAttribute('y2',h);l.setAttribute('stroke',col);l.setAttribute('stroke-width','0.8');svg.appendChild(l);}
  } else if (pattern === 'grid') {
    for(let x=0;x<w;x+=20){const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',x);l.setAttribute('y1',0);l.setAttribute('x2',x);l.setAttribute('y2',h);l.setAttribute('stroke',col);l.setAttribute('stroke-width','0.6');svg.appendChild(l);}
    for(let y=0;y<h;y+=20){const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',0);l.setAttribute('y1',y);l.setAttribute('x2',w);l.setAttribute('y2',y);l.setAttribute('stroke',col);l.setAttribute('stroke-width','0.6');svg.appendChild(l);}
  } else if (pattern === 'waves') {
    for(let y=0;y<h+20;y+=18){let d=`M 0 ${y}`;for(let x=0;x<=w;x+=20) d+=` Q ${x+10} ${y-6} ${x+20} ${y}`;const path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d',d);path.setAttribute('stroke',col);path.setAttribute('stroke-width','0.8');path.setAttribute('fill','none');svg.appendChild(path);}
  } else if (pattern === 'diamonds') {
    for(let x=0;x<w+20;x+=24) for(let y=0;y<h+20;y+=24){const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');poly.setAttribute('points',`${x+12},${y} ${x+24},${y+12} ${x+12},${y+24} ${x},${y+12}`);poly.setAttribute('stroke',col);poly.setAttribute('stroke-width','0.7');poly.setAttribute('fill','none');svg.appendChild(poly);}
  }
}

// ── STAMP ANIMATION ──
function animateStamp(el, message) {
  if (!el) return;
  el.classList.remove('animate-pop');
  void el.offsetWidth;
  el.classList.add('animate-pop');
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  ['✦','⭐','🎉','✨','💫','🌟','🎊'].forEach((e, i) => {
    const p = document.createElement('div');
    p.className = 'confetti-particle';
    p.textContent = e;
    p.style.left = (cx + (Math.random()-0.5)*70) + 'px';
    p.style.top  = (cy + (Math.random()-0.5)*40) + 'px';
    p.style.animationDelay = (i*0.06) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  });
  if (message) {
    const f = document.getElementById('stampFlash');
    f.textContent = message; f.classList.add('show');
    setTimeout(() => f.classList.remove('show'), 1600);
  }
}

// ── RENDER PAGE ──
function render() {
  const { code, cardId } = getCodeFromURL();
  const { cards, clients, activity } = getData();
  const main = document.getElementById('mainContent');

  // No code → show error
  if (!code) {
    main.innerHTML = `
      <div class="error-state">
        <div class="error-icon">🔗</div>
        <div class="error-title">Lien invalide</div>
        <div class="error-desc">Ce lien ne correspond à aucune carte de fidélité. Demandez votre lien personnel à votre commerçant.</div>
      </div>`;
    return;
  }

  const client = clients.find(c => c.code === code);
  if (!client) {
    main.innerHTML = `
      <div class="error-state">
        <div class="error-icon">👤</div>
        <div class="error-title">Carte introuvable</div>
        <div class="error-desc">Le code <strong style="color:var(--accent);font-family:'DM Mono',monospace">${code}</strong> ne correspond à aucun compte client enregistré.</div>
      </div>`;
    return;
  }

  // ── CONFIDENTIALITÉ INTER-COMMERÇANTS ──
  // On cherche le slot correspondant à la carte du commerçant (via ?card=)
  const slots = client.cardSlots || [{ cardId: client.cardId, stampsCurrent: client.stampsCurrent, stampsCompleted: client.stampsCompleted||0, expiry: null }];

  let targetSlot = null;
  let card = null;

  if (cardId) {
    // Lien spécifique à un commerçant : on filtre sur sa carte uniquement
    targetSlot = slots.find(s => s.cardId === cardId);
    card = cards.find(k => k.id === cardId);
  }

  // Fallback si pas de paramètre card (ancien lien)
  if (!targetSlot || !card) {
    targetSlot = slots[0];
    card = cards.find(k => k.id === targetSlot?.cardId);
  }

  if (!card) {
    main.innerHTML = `
      <div class="error-state">
        <div class="error-icon">🃏</div>
        <div class="error-title">Carte supprimée</div>
        <div class="error-desc">La carte de fidélité associée à votre compte n'existe plus. Contactez votre commerçant.</div>
      </div>`;
    return;
  }

  // Vérification expiration
  const isExpired = targetSlot.expiry && new Date(targetSlot.expiry) < new Date();
  const expiryDays = targetSlot.expiry ? Math.floor((new Date(targetSlot.expiry) - Date.now()) / 86400000) : null;

  // Update top bar
  document.getElementById('topShopName').textContent = card.shopName;
  document.title = `${card.shopName} — Ma carte`;

  const stampsNow = targetSlot.stampsCurrent ?? 0;
  const pct = Math.round(stampsNow / card.stampCount * 100);
  const isComplete = stampsNow >= card.stampCount;
  const remaining = card.stampCount - stampsNow;

  // Stamps HTML
  const stampsHTML = Array.from({length: card.stampCount}, (_, i) => `
    <div class="stamp-el ${card.shape||'circle'} ${i < stampsNow ? 'filled' : 'empty'}"
         id="stamp-${i}"
         style="border-color:${card.stampColor};color:${card.stampColor};background:${i < stampsNow ? card.stampColor+'28' : 'transparent'}">
      ${i < stampsNow ? (card.emoji||'⭐') : '·'}
    </div>`
  ).join('');

  // Expiry warning
  let expiryHTML = '';
  if (isExpired) {
    expiryHTML = `<div style="background:var(--danger2);border:1px solid rgba(224,112,112,0.3);border-radius:10px;padding:0.75rem 1rem;font-size:0.82rem;color:var(--danger);display:flex;align-items:center;gap:0.5rem">⚠ Cette carte a expiré. Contactez votre commerçant pour la renouveler.</div>`;
  } else if (expiryDays !== null && expiryDays <= 30) {
    expiryHTML = `<div style="background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.3);border-radius:10px;padding:0.75rem 1rem;font-size:0.82rem;color:var(--accent);display:flex;align-items:center;gap:0.5rem">⏳ Votre carte expire dans <strong>${expiryDays} jour${expiryDays>1?'s':''}</strong>.</div>`;
  }

  // Client history (filtered to this card only)
  const clientActivity = activity
    .filter(a => a.text && a.text.includes(client.name) && (!cardId || a.text.includes(card.shopName)))
    .slice(0, 5);

  const historyHTML = clientActivity.length === 0
    ? '<div class="history-item" style="color:var(--muted)">Aucune visite encore enregistrée</div>'
    : clientActivity.map(a => `
        <div class="history-item">
          <div class="h-dot" style="background:${a.color}"></div>
          <div class="h-text">${a.text.replace(/<[^>]+>/g, '')}</div>
          <div class="h-time">${timeAgo(a.time)}</div>
        </div>`).join('');

  main.innerHTML = `
    <div class="wrapper">

      <!-- Bonjour -->
      <div style="padding:0.5rem 0.2rem">
        <div style="font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700">Bonjour, ${client.prenom||client.name} 👋</div>
        <div style="font-size:0.82rem;color:var(--muted);margin-top:0.25rem">Membre depuis le ${formatDate(client.createdAt)}</div>
      </div>

      ${expiryHTML}

      <!-- Carte visuelle -->
      <div class="loyalty-card" style="${isExpired?'opacity:0.5;filter:grayscale(0.6)':''}">
        <div class="card-inner" id="cardInner" style="background:linear-gradient(135deg,${card.color1},${card.color2});color:${card.textColor}">
          <svg class="card-pattern" id="cardPattern" xmlns="http://www.w3.org/2000/svg"></svg>
          <div>
            <div class="card-top">
              <div>
                <div class="card-shop-name">${card.shopName}</div>
                <div class="card-tagline">${card.tagline||''}</div>
              </div>
              <div class="card-category">${card.category||''}</div>
            </div>
          </div>
          <div>
            <div class="card-stamps" id="cardStamps">${stampsHTML}</div>
            ${isComplete ? '<div class="complete-badge">🎉 Récompense disponible !</div>' : ''}
          </div>
        </div>
      </div>

      <!-- Progression -->
      <div class="progress-block">
        <div class="block-label">Ma progression — ${card.shopName}</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="progress-meta">
          <span>${stampsNow} / ${card.stampCount} tampons</span>
          <span class="progress-pct">${pct}%</span>
        </div>
      </div>

      <!-- Récompense -->
      <div class="reward-block ${isComplete ? 'complete' : ''}">
        <div class="reward-icon">${isComplete ? '🎉' : '🎁'}</div>
        <div>
          <div class="reward-name">${card.reward}</div>
          <div class="reward-desc">
            ${isExpired
              ? '⚠ Carte expirée — contactez votre commerçant.'
              : isComplete
              ? '🎊 Votre récompense est prête ! Présentez cette page à votre commerçant.'
              : `Plus que <strong style="color:var(--accent)">${remaining} tampon${remaining > 1 ? 's' : ''}</strong> pour obtenir votre récompense !`}
          </div>
        </div>
      </div>

      <!-- Code & QR -->
      <div class="code-block">
        <div>
          <div class="code-label">Mon code — ${card.shopName}</div>
          <div class="code-val">${client.code}</div>
          <div style="font-size:0.7rem;color:var(--muted);margin-top:0.3rem">À présenter en caisse</div>
        </div>
        <div class="qr-box" id="qrBox"></div>
      </div>

      <!-- Historique -->
      <div class="history-block">
        <div class="history-title">Historique chez ${card.shopName}</div>
        ${historyHTML}
      </div>

      <!-- Stats -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1rem;text-align:center">
          <div style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--accent)">${targetSlot.stampsCompleted||0}</div>
          <div style="font-size:0.7rem;color:var(--muted);margin-top:0.2rem;text-transform:uppercase;letter-spacing:0.5px">Récompenses obtenues</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1rem;text-align:center">
          <div style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--accent)">${client.stampsTotal||0}</div>
          <div style="font-size:0.7rem;color:var(--muted);margin-top:0.2rem;text-transform:uppercase;letter-spacing:0.5px">Tampons au total</div>
        </div>
      </div>

      <!-- Bouton déconnexion -->
      <div style="text-align:center;padding-top:0.5rem">
        <button onclick="disconnectCard()" style="background:none;border:none;color:var(--muted2);font-size:0.75rem;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline">
          Ce n'est pas ma carte ? Changer
        </button>
      </div>

    </div>`;

  // Animate progress bar
  setTimeout(() => {
    document.getElementById('progressFill').style.width = pct + '%';
  }, 300);

  // Apply pattern
  const patSvg = document.getElementById('cardPattern');
  if (patSvg) applyPattern(patSvg, card.pattern||'none', card.textColor, 400, 200);

  // QR code — pointe vers cette même page
  const qrBox = document.getElementById('qrBox');
  if (qrBox) {
    try {
      new QRCode(qrBox, {
        text: window.location.href,
        width: 60, height: 60,
        colorDark: '#111', colorLight: '#fff',
        correctLevel: QRCode.CorrectLevel.L
      });
    } catch(e) { qrBox.textContent = '⬡'; }
  }

  // Animate stamps on load
  const stampEls = document.querySelectorAll('.stamp-el.filled');
  stampEls.forEach((el, i) => {
    setTimeout(() => {
      el.classList.remove('animate-pop');
      void el.offsetWidth;
      el.classList.add('animate-pop');
    }, 400 + i * 80);
  });

  // Update progress bar
  setTimeout(() => {
    document.getElementById('progressFill').style.width = pct + '%';
  }, 300);

  // PWA banner after 4s
  setTimeout(() => {
    if (!sessionStorage.getItem('pwa-dismissed')) {
      document.getElementById('installBanner').classList.add('show');
    }
  }, 4000);
}

function disconnectCard() {
  if (confirm('Voulez-vous changer de carte ? Votre carte actuelle sera oubliée sur cet appareil.')) {
    localStorage.removeItem('fp_client_code');
    localStorage.removeItem('fp_client_card');
    document.getElementById('mainContent').innerHTML = `
      <div class="error-state">
        <div class="error-icon">🔗</div>
        <div style="font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:0.5rem">Carte déconnectée</div>
        <div style="font-size:0.85rem;color:var(--muted);line-height:1.5;max-width:280px">
          Scannez le QR code de votre commerçant ou utilisez votre lien personnel pour retrouver votre carte.
        </div>
      </div>`;
  }
}

// ── PWA ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  setTimeout(() => document.getElementById('installBanner').classList.add('show'), 2000);
});
function installApp() {
  document.getElementById('installBanner').classList.remove('show');
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => deferredPrompt = null);
  } else {
    alert('Sur iPhone : appuyez sur le bouton Partager (📤) puis "Sur l\'écran d\'accueil"');
  }
}
function dismissBanner() {
  document.getElementById('installBanner').classList.remove('show');
  sessionStorage.setItem('pwa-dismissed', '1');
}

// ── PWA Manifest ──
const manifest = {
  name: 'Ma carte de fidélité',
  short_name: 'Ma Carte',
  // start_url sans paramètres → localStorage prend le relais
  start_url: window.location.pathname,
  display: 'standalone',
  background_color: '#0f0e11',
  theme_color: '#0f0e11',
  icons: [{
    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%230f0e11'/><text y='140' x='96' text-anchor='middle' font-size='120' fill='%23c8a96e'>✦</text></svg>",
    sizes: '192x192', type: 'image/svg+xml'
  }]
};
const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
const mLink = document.createElement('link');
mLink.rel = 'manifest'; mLink.href = URL.createObjectURL(mBlob);
document.head.appendChild(mLink);

// ── BOOT ──
render();

// Auto-refresh toutes les 30s pour voir les nouveaux tampons
setInterval(() => { render(); }, 30000);
</script>
</body>
</html>
